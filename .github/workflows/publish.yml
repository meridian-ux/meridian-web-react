name: publish

# OIDC trusted publishing to npmjs — no long-lived tokens, automatic provenance.
#
# Builds the package with Bazel (//:pkg) then `npm publish` exchanges the GitHub
# Actions OIDC token for a short-lived npm credential. Requires a TRUSTED
# PUBLISHER on @savvifi/meridian-web-react at npmjs.com (Settings → Trusted
# Publisher):
#   Provider:   GitHub Actions
#   Owner:      meridian-ux
#   Repository: meridian-web-react
#   Workflow:   publish.yml
#   Allowed:    npm publish
# (npm has no "pending publisher" flow, so the first version is seeded once with a
# token, then every subsequent publish flows through here tokenlessly.)
on:
  workflow_dispatch:
    inputs:
      tag:
        description: "npm dist-tag. Blank ⇒ derived from the version (prerelease → its identifier, e.g. 0.9.2-rc.1 → rc; else latest)."
        required: false
        default: ""
  push:
    tags:
      - "v*"

permissions:
  contents: read
  id-token: write # required for OIDC trusted publishing

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"
          package-manager-cache: false

      # OIDC trusted publishing needs npm >= 11.5.1; Node 22 ships an older npm.
      - name: Upgrade npm + install bazelisk
        run: |
          npm install -g npm@latest @bazel/bazelisk
          npm --version
          bazelisk version

      - name: Build the package
        run: bazelisk build //:pkg

      # bazel-bin is a read-only symlink tree → copy to a writable dir. `npm
      # publish` auto-detects OIDC (id-token: write + configured trusted publisher)
      # and attaches a provenance attestation.
      #
      # The dist-tag is passed EXPLICITLY. npm defaults to `latest` regardless of
      # the version string — it does NOT infer a tag from a prerelease — so a bare
      # `npm publish` of 0.9.2-rc.1 would point `latest` at a release candidate.
      # Derive it from the version unless the dispatch overrides it, so a tag push
      # is safe too (not just the manual path).
      - name: Publish @savvifi/meridian-web-react
        env:
          TAG_INPUT: ${{ inputs.tag }}
        run: |
          rm -rf "$RUNNER_TEMP/pkg"
          cp -RL bazel-bin/pkg "$RUNNER_TEMP/pkg"
          cd "$RUNNER_TEMP/pkg"

          VERSION="$(node -p 'require("./package.json").version')"
          TAG="$TAG_INPUT"
          if [ -z "$TAG" ]; then
            PRERELEASE="${VERSION#*-}"
            if [ "$PRERELEASE" = "$VERSION" ]; then
              TAG="latest"
            else
              TAG="${PRERELEASE%%.*}"
            fi
          fi

          echo "publishing $VERSION with dist-tag '$TAG'"
          npm publish --tag "$TAG"
